<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zoom Lens — Interactive Image Magnifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --lens-size: 200px;
        --zoom: 1.55;
      }
      body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; }

      /* Zoom mechanics — can't be replaced by Tailwind */
      .zoom { position: relative; overflow: hidden; background: #f5f5f5; }
      .zoom img {
        width: 100%; height: 100%; object-fit: cover; display: block;
        user-select: none; -webkit-user-drag: none; pointer-events: none;
      }
      .zoom.is-hover { cursor: none; }

      .zoom .layer {
        position: absolute; inset: 0; overflow: hidden; z-index: 10;
        opacity: 0; transform: scale(0.58);
        transform-origin: var(--x) var(--y);
        transition: opacity 300ms ease-out, transform 300ms ease-out;
        will-change: opacity, transform;
      }
      .zoom.is-hover .layer { opacity: 1; transform: scale(1); }
      .zoom.is-leaving .layer { opacity: 0; transform: scale(0.8); }

      .zoom .zoomed {
        position: absolute; inset: 0;
        transform: scale(var(--zoom));
        transform-origin: var(--x) var(--y);
      }

      .zoom .lens {
        position: absolute;
        width: var(--lens-size); height: var(--lens-size);
        border-radius: 999px; pointer-events: none; z-index: 20;
        border: 1.5px solid rgba(255,255,255,0.55);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.10), inset 0 0 0 1px rgba(0,0,0,0.05);
        opacity: 0; transform: scale(0.58);
        transition: opacity 300ms ease-out, transform 300ms ease-out;
        will-change: opacity, transform;
      }
      .zoom.is-hover .lens { opacity: 1; transform: scale(1); }
      .zoom.is-leaving .lens { opacity: 0; transform: scale(0.8); }

      /* Custom range slider */
      input[type="range"] {
        -webkit-appearance: none; appearance: none;
        height: 4px; border-radius: 2px; background: #e5e7eb; outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 14px; height: 14px; border-radius: 50%;
        background: #000; cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
        transition: transform 150ms ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px; height: 14px; border-radius: 50%;
        background: #000; cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
      }
    </style>
  </head>
  <body class="bg-white text-black antialiased min-h-screen">

    <!-- Nav -->
    <nav class="sticky top-0 z-50 border-b border-[#eaeaea] bg-white/80 backdrop-blur-md">
      <div class="max-w-3xl mx-auto px-6 h-14 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i data-lucide="scan-search" class="w-5 h-5 text-black" style="stroke-width:1.5"></i>
          <span class="text-sm font-semibold tracking-tight">Zoom Lens</span>
        </div>
        <a href="https://github.com/Tan35/zoom-lens-magnifier" target="_blank" rel="noopener"
           class="flex items-center gap-1.5 text-xs text-[#666] hover:text-black transition-colors duration-150">
          <i data-lucide="github" class="w-4 h-4" style="stroke-width:1.5"></i>
          <span>GitHub</span>
        </a>
      </div>
    </nav>

    <!-- Main -->
    <main class="max-w-3xl mx-auto px-6 py-12 sm:py-16">

      <!-- Hero -->
      <div class="text-center mb-12">
        <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight mb-4">
          圆形放大镜
        </h1>
        <p class="text-sm sm:text-[15px] text-[#666] leading-relaxed max-w-lg mx-auto">
          上传任意图片，体验圆形放大镜效果。同一张图渲染两层，上层
          <code class="bg-[#f5f5f5] text-[#333] px-1.5 py-0.5 rounded text-[13px] font-mono">scale()</code>
          放大，再用
          <code class="bg-[#f5f5f5] text-[#333] px-1.5 py-0.5 rounded text-[13px] font-mono">mask-image</code>
          挖出圆形窗口。
        </p>
      </div>

      <!-- Upload Zone -->
      <div class="mb-8">
        <div id="uploadZone"
             class="relative border border-dashed border-[#d4d4d4] rounded-xl p-8 sm:p-10 text-center
                    cursor-pointer transition-all duration-200
                    hover:border-[#999] hover:bg-[#fafafa]
                    group">
          <input type="file" id="fileInput" accept="image/*"
                 class="absolute inset-0 opacity-0 cursor-pointer z-10" />
          <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-[#f5f5f5] flex items-center justify-center
                        group-hover:bg-[#eee] transition-colors duration-200">
              <i data-lucide="upload-cloud" class="w-5 h-5 text-[#999]" style="stroke-width:1.5"></i>
            </div>
            <div>
              <p class="text-sm font-medium text-[#333]">点击上传或拖放图片</p>
              <p class="text-xs text-[#999] mt-1">JPG, PNG, WebP, SVG</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-6 sm:gap-8 mb-5 flex-wrap">
        <div class="flex items-center gap-3">
          <label class="text-xs text-[#666] whitespace-nowrap select-none">放大倍数</label>
          <input type="range" id="zoomRange" min="1.1" max="3" step="0.05" value="1.55" class="w-24 sm:w-28" />
          <span id="zoomValue" class="text-xs font-medium text-black tabular-nums min-w-[36px]">1.55x</span>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-[#666] whitespace-nowrap select-none">镜片大小</label>
          <input type="range" id="lensRange" min="100" max="350" step="10" value="200" class="w-24 sm:w-28" />
          <span id="lensValue" class="text-xs font-medium text-black tabular-nums min-w-[36px]">200px</span>
        </div>
        <button id="btnReset"
                class="ml-auto text-xs text-[#666] hover:text-black border border-[#eaeaea] hover:border-[#ccc]
                       rounded-lg px-3.5 py-1.5 transition-all duration-150
                       flex items-center gap-1.5">
          <i data-lucide="rotate-ccw" class="w-3.5 h-3.5" style="stroke-width:1.5"></i>
          恢复示例
        </button>
      </div>

      <!-- Zoom Canvas -->
      <div class="border border-[#eaeaea] rounded-xl overflow-hidden bg-[#f5f5f5]">
        <div class="zoom aspect-square" id="zoom">
          <img id="baseImg"
               src="https://www.kumailnanji.com/images/letters/letter-correction.png"
               alt="Zoom lens demo" draggable="false" />
          <div class="layer" id="layer">
            <div class="zoomed" id="zoomed">
              <img id="zoomImg" src="" alt="" draggable="false" />
            </div>
          </div>
          <div class="lens" id="lens" aria-hidden="true"></div>
        </div>
      </div>

      <!-- Hint -->
      <div class="flex items-center justify-center gap-1.5 mt-4">
        <i data-lucide="mouse-pointer" class="w-3.5 h-3.5 text-[#bbb]" style="stroke-width:1.5"></i>
        <p class="text-xs text-[#999]">在图片上移动鼠标，体验放大镜效果</p>
      </div>

      <!-- Footer Divider -->
      <div class="border-t border-[#eaeaea] mt-16 pt-6 flex items-center justify-between">
        <p class="text-xs text-[#999]">Pure HTML / CSS / JS — Zero dependencies</p>
        <a href="https://github.com/Tan35/zoom-lens-magnifier" target="_blank" rel="noopener"
           class="text-xs text-[#999] hover:text-black transition-colors duration-150 flex items-center gap-1.5">
          <i data-lucide="star" class="w-3.5 h-3.5" style="stroke-width:1.5"></i>
          Star on GitHub
        </a>
      </div>

    </main>

    <script>
      // Init Lucide icons
      lucide.createIcons();

      // ── Elements ──
      const el        = document.getElementById("zoom");
      const layer     = document.getElementById("layer");
      const lens      = document.getElementById("lens");
      const baseImg   = document.getElementById("baseImg");
      const zoomImg   = document.getElementById("zoomImg");
      const fileInput = document.getElementById("fileInput");
      const uploadZone = document.getElementById("uploadZone");
      const zoomRange  = document.getElementById("zoomRange");
      const lensRange  = document.getElementById("lensRange");
      const zoomValue  = document.getElementById("zoomValue");
      const lensValue  = document.getElementById("lensValue");
      const btnReset   = document.getElementById("btnReset");

      const DEMO_SRC = "https://www.kumailnanji.com/images/letters/letter-correction.png";

      // ── Sync src ──
      function syncZoomSrc() {
        const src = baseImg.currentSrc || baseImg.src;
        if (zoomImg.src !== src) zoomImg.src = src;
      }
      baseImg.addEventListener("load", syncZoomSrc);
      baseImg.addEventListener("error", syncZoomSrc);
      syncZoomSrc();

      // ── Lens size reader ──
      function getLensSize() {
        return parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue("--lens-size")
        );
      }

      // ── Position ──
      function setPos(clientX, clientY) {
        const r = el.getBoundingClientRect();
        const x = clientX - r.left;
        const y = clientY - r.top;
        const half = getLensSize() / 2;

        const mask = `radial-gradient(circle ${half}px at ${x}px ${y}px, black 100%, transparent 100%)`;
        layer.style.webkitMaskImage = mask;
        layer.style.maskImage = mask;

        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);

        lens.style.left = `${x - half}px`;
        lens.style.top  = `${y - half}px`;
      }

      // ── Hover states ──
      let leaveTimer = null;

      el.addEventListener("mouseenter", () => {
        if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
        el.classList.remove("is-leaving");
        el.classList.add("is-hover");
      });
      el.addEventListener("mouseleave", () => {
        el.classList.remove("is-hover");
        el.classList.add("is-leaving");
        leaveTimer = setTimeout(() => {
          el.classList.remove("is-leaving");
          leaveTimer = null;
        }, 300);
      });
      el.addEventListener("mousemove", (e) => setPos(e.clientX, e.clientY));

      // ── Touch ──
      el.addEventListener("touchstart", (e) => {
        el.classList.add("is-hover");
        el.classList.remove("is-leaving");
        const t = e.touches[0];
        if (t) setPos(t.clientX, t.clientY);
      }, { passive: true });
      el.addEventListener("touchmove", (e) => {
        const t = e.touches[0];
        if (t) setPos(t.clientX, t.clientY);
      }, { passive: true });
      el.addEventListener("touchend", () => {
        el.classList.remove("is-hover");
        el.classList.add("is-leaving");
        setTimeout(() => el.classList.remove("is-leaving"), 300);
      });

      // ── Init position ──
      requestAnimationFrame(() => {
        const r0 = el.getBoundingClientRect();
        setPos(r0.left + r0.width * 0.25, r0.top + r0.height * 0.25);
      });

      // ── File upload ──
      function loadImage(src) {
        baseImg.src = src;
        syncZoomSrc();
      }

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => loadImage(ev.target.result);
        reader.readAsDataURL(file);
      });

      uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.classList.add("border-[#999]", "bg-[#fafafa]");
      });
      uploadZone.addEventListener("dragleave", () => {
        uploadZone.classList.remove("border-[#999]", "bg-[#fafafa]");
      });
      uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.classList.remove("border-[#999]", "bg-[#fafafa]");
        const file = e.dataTransfer.files?.[0];
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = (ev) => loadImage(ev.target.result);
        reader.readAsDataURL(file);
      });

      // ── Controls ──
      zoomRange.addEventListener("input", () => {
        const v = parseFloat(zoomRange.value);
        document.documentElement.style.setProperty("--zoom", v);
        zoomValue.textContent = v.toFixed(2) + "x";
      });
      lensRange.addEventListener("input", () => {
        const v = parseInt(lensRange.value, 10);
        document.documentElement.style.setProperty("--lens-size", v + "px");
        lensValue.textContent = v + "px";
      });

      btnReset.addEventListener("click", () => {
        loadImage(DEMO_SRC);
        fileInput.value = "";
        zoomRange.value = 1.55;
        lensRange.value = 200;
        document.documentElement.style.setProperty("--zoom", 1.55);
        document.documentElement.style.setProperty("--lens-size", "200px");
        zoomValue.textContent = "1.55x";
        lensValue.textContent = "200px";
      });
    </script>
  </body>
</html>
